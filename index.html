<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Grocery Mart - Chanakyapuri</title>
    <style>
        /* ROYAL BLUE AND BLACK THEME COLORS */
        :root {
            --primary-blue: #0A2540;
            --royal-blue: #4169E1;
            --deep-black: #0F0F11;
            --pure-black: #000000;
            --light-bg: #1A1A24;
            --card-bg: #242432;
            --text-light: #F5F7FA;
            --accent-gold: #FFD700;
            --admin-red: #d9534f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--deep-black);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* HEADER & NAVIGATION */
        header {
            background: linear-gradient(135deg, var(--pure-black) 30%, var(--primary-blue) 100%);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--royal-blue);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .brand {
            text-align: center;
            position: relative;
            width: 100%;
        }

        .brand h1 {
            color: var(--text-light);
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand h1 span {
            color: var(--royal-blue);
            text-shadow: 0 0 10px rgba(65, 105, 225, 0.6);
        }

        .address {
            color: var(--accent-gold);
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* ADMIN ACCESS BUTTON */
        .admin-login-btn {
            position: absolute;
            right: 0;
            top: 10px;
            background: transparent;
            border: 1px solid var(--royal-blue);
            color: var(--royal-blue);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .admin-login-btn:hover {
            background: var(--royal-blue);
            color: white;
        }

        /* SEARCH ENGINE BAR */
        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--royal-blue);
            border-radius: 30px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px var(--royal-blue);
        }

        /* MAIN PRODUCTS SECTION */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            margin-bottom: 30px;
            border-left: 5px solid var(--royal-blue);
            padding-left: 15px;
            font-size: 1.8rem;
        }

        /* SECRET ADMIN PANEL STYLING */
        .admin-panel {
            background: #1e1e2d;
            border: 2px dashed var(--admin-red);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 35px;
            display: none; /* Hidden by default */
        }
        .admin-panel h3 {
            color: var(--admin-red);
            margin-bottom: 15px;
        }
        .admin-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .admin-form select, .admin-form input {
            padding: 10px;
            background: var(--light-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            min-width: 200px;
        }
        .admin-form button {
            background: var(--admin-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* PRODUCT GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(65, 105, 225, 0.2);
            border-color: var(--royal-blue);
        }

        .product-img {
            width: 100%;
            height: 180px;
            background-color: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            gap: 10px;
        }

        .product-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-light);
            min-height: 44px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.2rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .buy-btn {
            background-color: var(--royal-blue);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #2b52c2;
        }

        /* NO RESULTS STATE */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #888;
            display: none;
        }

        /* FIREBASE DATABASE TEST SECTION */
        .db-panel {
            margin-top: 50px;
            background: linear-gradient(var(--card-bg), var(--pure-black));
            padding: 30px;
            border-radius: 12px;
            border-top: 3px solid var(--royal-blue);
            text-align: center;
        }
        
        .db-panel input {
            padding: 10px 15px;
            margin: 10px;
            border-radius: 4px;
            border: 1px solid var(--royal-blue);
            background: var(--light-bg);
            color: white;
            width: 250px;
        }
    </style>
</head>

        // Function to render products inside the UI
        function renderProducts(products) {
            grid.innerHTML = "";
            grid.appendChild(noResults);

            if(products.length === 0) {
                noResults.style.display = "block";
                return;
            }

            noResults.style.display = "none";

                const card = document.createElement("div");

                    <div class="product-img">
                        <img src="${item.img}" alt="${item.name}">
